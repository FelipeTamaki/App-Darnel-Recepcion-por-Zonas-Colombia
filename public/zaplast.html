<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Darnel | Notas ZAPLAST</title>
    <meta name="description" content="Procesá notas de pedido ZAPLAST y descargá el reporte agrupado por zona." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;500;600;700&family=Instrument+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-tool="zaplast">
    <nav class="top-nav">
      <div class="nav-inner">
        <a class="nav-brand" href="/index.html">
          <img src="/assets/darnel-logo.png" alt="Darnel" class="nav-logo" />
          <span>Suite Darnel</span>
        </a>
        <a class="nav-back" href="/index.html">← Inicio</a>
      </div>
    </nav>

    <div class="app-shell">
      <header class="page-header">
        <p class="eyebrow">Operación ZAPLAST</p>
        <h1 class="page-title">Notas de Pedido ZAPLAST</h1>
        <p class="page-desc">Subí uno o más PDFs y descargá el reporte agrupado por zona.</p>
      </header>

      <div class="section-divider"></div>

      <form id="tool-form" class="upload-layout upload-layout-single">
        <label class="upload-field">
          <span class="field-label">Notas de Pedido (PDF) — podés subir varios a la vez</span>
          <div class="file-input-shell">
            <input type="file" name="pdfs" accept=".pdf" multiple required />
          </div>
          <div class="file-selection" data-file-output="pdfs"></div>
        </label>

        <button id="submit-button" class="primary-action" type="submit">Procesar PDFs</button>
      </form>

      <div class="action-bar">
        <div id="status-banner" class="status-banner" hidden></div>
        <button id="download-button" class="download-primary" type="button" hidden>
          ↓ Descargar Excel
        </button>
      </div>

      <section id="results-section" hidden>
        <div class="section-divider"></div>
        <div class="stats-row" id="stats-row"></div>
        <div class="zone-summary" id="zone-summary"></div>
        <div class="warning-box" id="warning-box" hidden></div>
        <div class="sheet-tabs" id="sheet-tabs"></div>
        <div class="sheet-preview" id="sheet-preview"></div>
      </section>
    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
